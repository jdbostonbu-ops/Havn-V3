<!--
  seed.html — One-time seeding tool for HAVN

  How to use:
  1. Make sure firebaseConfig is filled in inside app.js
  2. Open this page in your browser at the same origin as your app
     (e.g. http://localhost:5500/seed.html)
  3. Sign in with Google (you only need to do this once)
  4. Click "Seed Firestore" — pushes all 24 mock pins into the
     'resources' collection in Firestore. Each gets a verified:true flag
     and source:"seed" so you can identify and delete them later.
  5. Close the tab. Never run this twice or you'll get duplicate pins.

  After seeding, you can delete this file — it isn't part of the app.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HAVN — Seed Firestore</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; background:#0F3D2E; color:#F4F1E8 }
    h1 { color:#F4F1E8 }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; background:#F4F1E8; color:#0F3D2E; border:0; border-radius:8px; font-weight:700 }
    button:disabled { opacity: 0.5; cursor: not-allowed }
    pre { background:#0a2a20; color:#b8e0d0; padding:14px; border-radius:8px; overflow:auto; max-height:400px }
  </style>
</head>
<body>
  <h1>HAVN — Seed Firestore</h1>
  <p>This is a one-time tool. It pushes the 24 mock resources from <code>app.js</code> into Firestore as seed data.</p>
  <p>Sign in first (must be a Google account you trust):</p>
  <button id="signin">1. Sign in with Google</button>
  <button id="seed" disabled>2. Seed Firestore</button>
  <pre id="log">Ready.</pre>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
      from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js';
    import { getFirestore, collection, addDoc, serverTimestamp }
      from 'https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js';

    // Real Firebase config for HAVN
    const firebaseConfig = {
      apiKey: 'AIzaSyB0aCm9Vfyawq2OiRtbsYWMZOz-BoCAUmg',
      authDomain: 'havn-app-cad46.firebaseapp.com',
      projectId: 'havn-app-cad46',
      storageBucket: 'havn-app-cad46.firebasestorage.app',
      messagingSenderId: '850316577510',
      appId: '1:850316577510:web:bc43da923b13681dba4927',
      measurementId: 'G-5GRHKYYPM3'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const log = (msg) => {
      const el = document.getElementById('log');
      el.textContent = msg + '\n' + el.textContent;
    };

    document.getElementById('signin').addEventListener('click', async () => {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (e) { log('Sign-in error: ' + e.message); }
    });

    onAuthStateChanged(auth, (user) => {
      if (user) {
        log('Signed in as ' + user.email);
        document.getElementById('seed').disabled = false;
      }
    });

    // The seed resources — same shape as initialResources in app.js,
    // covering NYC, LA, Las Vegas, FL, MD, HI, DC and CT corridor.
    const SEED = [
      // New York City — Manhattan, Brooklyn, Queens, Bronx
      { category:'Shelter', title:'Bowery Mission', latitude:40.7227, longitude:-73.9933, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Lower East Side', transit:'F to 2 Av', description:'Year-round shelter and meals.' },
      { category:'Food', title:'Holy Apostles Soup Kitchen', latitude:40.7459, longitude:-74.0008, status:'OPEN', start_time:'10:30am', end_time:'12:30pm', distance:'Chelsea', transit:'C/E to 23 St', description:'Free lunch, no questions asked.' },
      { category:'Warming', title:'NYC Drop-in Center', latitude:40.8076, longitude:-73.9444, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Harlem', transit:'2/3 to 135 St', description:'Warming center during cold snaps.' },
      { category:'Healthcare', title:'Coney Island Mobile Clinic', latitude:40.5749, longitude:-73.9857, status:'OPEN', start_time:'9:00am', end_time:'5:00pm', distance:'Brooklyn', transit:'D/F/N/Q to Coney Island', description:'Walk-in primary care.' },

      // Los Angeles
      { category:'Shelter', title:'Union Rescue Mission', latitude:34.0431, longitude:-118.2475, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Downtown LA', transit:'Metro Red Line to Civic Center', description:'Emergency shelter for families.' },
      { category:'Food', title:'LA Mission Meal Service', latitude:34.0444, longitude:-118.2454, status:'OPEN', start_time:'5:30am', end_time:'7:00pm', distance:'Skid Row', transit:'Metro to Pershing Sq', description:'Three meals daily.' },
      { category:'Showers', title:'LA Community Action Hygiene', latitude:34.0407, longitude:-118.2468, status:'OPEN', start_time:'8:00am', end_time:'4:00pm', distance:'Downtown LA', transit:'7th/Metro Center', description:'Free showers and toiletries.' },
      { category:'Cooling', title:'Echo Park Cooling Center', latitude:34.0782, longitude:-118.2606, status:'OPEN', start_time:'10:00am', end_time:'8:00pm', distance:'Echo Park', transit:'Metro to Echo Park', description:'Heat-relief station with water.' },

      // Las Vegas
      { category:'Shelter', title:'Las Vegas Rescue Mission', latitude:36.1741, longitude:-115.1346, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Downtown LV', transit:'RTC Route 113', description:'Shelter, meals, recovery programs.' },
      { category:'Cooling', title:'Stratosphere Cooling Station', latitude:36.1473, longitude:-115.1551, status:'OPEN', start_time:'10:00am', end_time:'10:00pm', distance:'Las Vegas Strip', transit:'Deuce bus', description:'Public cooling during summer heat.' },
      { category:'Food', title:'Catholic Charities Dining Hall', latitude:36.1716, longitude:-115.1346, status:'OPEN', start_time:'11:00am', end_time:'1:00pm', distance:'Downtown LV', transit:'RTC Route 207', description:'Hot lunch service.' },

      // Florida — Miami
      { category:'Healthcare', title:'Camillus Health Concern', latitude:25.7775, longitude:-80.1939, status:'OPEN', start_time:'8:00am', end_time:'5:00pm', distance:'Downtown Miami', transit:'Metromover Government Center', description:'Care for uninsured.' },
      { category:'Shelter', title:'Camillus House', latitude:25.7867, longitude:-80.2086, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Miami', transit:'Metrorail Allapattah', description:'Emergency and long-term shelter.' },

      // Maryland — Baltimore
      { category:'Food', title:'Beans and Bread', latitude:39.2780, longitude:-76.5949, status:'OPEN', start_time:'8:00am', end_time:'2:00pm', distance:'Fells Point', transit:'CityLink Orange', description:'Daily meals and case management.' },
      { category:'Shelter', title:'Baltimore Station', latitude:39.2802, longitude:-76.6093, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'South Baltimore', transit:'CityLink Yellow', description:'Veteran-focused residential program.' },

      // Hawaii — Honolulu
      { category:'Shelter', title:'Institute for Human Services', latitude:21.3186, longitude:-157.8633, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Iwilei', transit:'TheBus Route 1', description:'Largest shelter on Oahu.' },
      { category:'Food', title:'River of Life Mission', latitude:21.3133, longitude:-157.8633, status:'OPEN', start_time:'5:30am', end_time:'7:00am', distance:'Chinatown', transit:'TheBus Route 2', description:'Breakfast and lunch service.' },

      // Washington DC
      { category:'Shelter', title:'CCNV Shelter', latitude:38.8951, longitude:-77.0151, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Penn Quarter', transit:'Judiciary Sq Metro', description:'1,350-bed shelter.' },
      { category:'Healthcare', title:'Unity Health Care', latitude:38.9072, longitude:-77.0369, status:'OPEN', start_time:'8:00am', end_time:'5:00pm', distance:'Downtown DC', transit:'Metro Center', description:'Federally qualified health center.' },

      // Connecticut corridor (original)
      { category:'Food', title:'Hartford Community Food Pantry', latitude:41.7637, longitude:-72.6851, status:'OPEN', start_time:'9:00am', end_time:'3:00pm', distance:'Downtown Hartford', transit:'CTtransit Route 30', description:'Groceries and hot meals.' },
      { category:'Shelter', title:'Open Hearth Hartford', latitude:41.7659, longitude:-72.6734, status:'OPEN', start_time:'24/7', end_time:'24/7', distance:'Hartford', transit:'CTtransit Route 60', description:'Men\'s shelter and transitional housing.' },
      { category:'Warming', title:'New Haven Warming Center', latitude:41.3083, longitude:-72.9279, status:'OPEN', start_time:'7:00pm', end_time:'7:00am', distance:'New Haven', transit:'CTtransit Route Z', description:'Cold-weather overnight shelter.' },
      { category:'Transit', title:'Bridgeport Transit Aid Desk', latitude:41.1865, longitude:-73.1952, status:'OPEN', start_time:'7:00am', end_time:'9:00pm', distance:'Bridgeport', transit:'Greater Bridgeport Transit', description:'Free transit tokens for those in need.' },
      { category:'Clothing', title:'Stamford Clothing Bank', latitude:41.0534, longitude:-73.5387, status:'OPEN', start_time:'10:00am', end_time:'4:00pm', distance:'Stamford', transit:'Metro-North to Stamford', description:'Free clothing for adults and children.' }
    ];

    document.getElementById('seed').addEventListener('click', async () => {
      const user = auth.currentUser;
      if (!user) { log('Sign in first'); return; }
      document.getElementById('seed').disabled = true;
      log('Seeding ' + SEED.length + ' resources...');
      let count = 0;
      for (const resource of SEED) {
        try {
          await addDoc(collection(db, 'resources'), {
            ...resource,
            verified: true,
            source: 'seed',
            provider_id: user.uid,
            created_at: serverTimestamp()
          });
          count++;
          log('  ✓ ' + resource.title);
        } catch (e) {
          log('  ✗ ' + resource.title + ' — ' + e.message);
        }
      }
      log('Done. Seeded ' + count + '/' + SEED.length + ' resources.');
    });
  </script>
</body>
</html>
